name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_release:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Sync package.json version to tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$TAG_VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build JS bundles
        run: bun run build

      - name: Build and Publish Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx electron-builder --publish always -${{ matrix.os == 'macos-latest' && 'm' || matrix.os == 'windows-latest' && 'w' || 'l' }}