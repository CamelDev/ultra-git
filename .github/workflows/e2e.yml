name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Check for Lockfile
        run: ls -la bun.lock || echo "No bun.lock found"

      - name: Install Playwright OS Dependencies
        run: bunx playwright install --with-deps

      - name: Build Application
        run: bun run build

      - name: Run E2E Tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" bun run test:e2e
